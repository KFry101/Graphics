<html>

<!-- VERTEX SHADER SOURCE CODE: Written in GLSL -->
<script id="vertex-shader-1" type="x-shader/x-vertex">
    #version 300 es
    in vec4 position;

    void main() {
      gl_Position = position;
      gl_PointSize = 10.0;
    }
</script>

<!-- FRAGMENT SHADER SOURCE CODE: Written in GLSL -->
<script id="fragment-shader-1" type="x-shader/x-fragment">
    #version 300 es 
    precision mediump float;

    uniform vec4 color;
    out vec4 outColor;

    void main() {
      outColor = color;
    }
</script>

<!-- VERTEX SHADER SOURCE CODE: Written in GLSL -->
<script id="vertex-shader-2" type="x-shader/x-vertex">
  #version 300 es

  in vec4 position;
  in vec4 color;
  out vec4 v_color;

  void main() {
    gl_Position = position;
    gl_PointSize = 10.0;
    v_color = color;
  }

</script>

<!-- VERTEX SHADER SOURCE CODE: Written in GLSL -->
<script id="vertex-shader-3" type="x-shader/x-vertex">
  #version 300 es

  in vec4 position;
  in vec4 color;

  uniform vec4 translation;
  
  out vec4 v_color;

  void main() {
    gl_Position = position + translation;
    //gl_Position = position + vec4(0.5, 0.0,0.0,0.0);
    gl_PointSize = 10.0;
    v_color = color;
  }

</script>

<!-- FRAGMENT SHADER SOURCE CODE: Written in GLSL -->
<script id="fragment-shader-2" type="x-shader/x-fragment">
  #version 300 es 
  precision mediump float;

  in vec4 v_color;
  out vec4 outColor;

  void main() {
    outColor = v_color;
  }
</script>

<canvas id="gl-canvas" width="400" height="400"> </canvas>

<script>
var program1;
var program2;
var program3;
var program1VAO;
var program2VAO;
var program1_colorLoc;
var program3_translationLoc;

// EXECUTION: Code executes starting here when we launch this file
window.onload = function init()
{
    canvas = document.getElementById( "gl-canvas" );
    gl = canvas.getContext('webgl2');
 
    // Create program 1
    var vertElem = document.getElementById( "vertex-shader-1");
    var vertShdr = gl.createShader( gl.VERTEX_SHADER );
    gl.shaderSource( vertShdr, vertElem.textContent.replace(/^\s+|\s+$/g, '' ));
    gl.compileShader( vertShdr );

    var fragElem = document.getElementById( "fragment-shader-1" );
    var fragShdr = gl.createShader( gl.FRAGMENT_SHADER );
    gl.shaderSource( fragShdr, fragElem.textContent.replace(/^\s+|\s+$/g, '' ) );
    gl.compileShader( fragShdr );

    program1 = gl.createProgram();
    gl.attachShader( program1, vertShdr );
    gl.attachShader( program1, fragShdr );
    gl.linkProgram( program1 );

    // create program 2
    var vertElem = document.getElementById( "vertex-shader-2");
    var vertShdr = gl.createShader( gl.VERTEX_SHADER );
    gl.shaderSource( vertShdr, vertElem.textContent.replace(/^\s+|\s+$/g, '' ));
    gl.compileShader( vertShdr );

    var fragElem = document.getElementById( "fragment-shader-2" );
    var fragShdr = gl.createShader( gl.FRAGMENT_SHADER );
    gl.shaderSource( fragShdr, fragElem.textContent.replace(/^\s+|\s+$/g, '' ) );
    gl.compileShader( fragShdr );

    program2 = gl.createProgram();
    gl.attachShader( program2, vertShdr );
    gl.attachShader( program2, fragShdr );
    gl.linkProgram( program2 );

    // create program 3
    var vertElem = document.getElementById( "vertex-shader-3");
    var vertShdr = gl.createShader( gl.VERTEX_SHADER );
    gl.shaderSource( vertShdr, vertElem.textContent.replace(/^\s+|\s+$/g, '' ));
    gl.compileShader( vertShdr );
/*
    var fragElem = document.getElementById( "fragment-shader-2" );
    var fragShdr = gl.createShader( gl.FRAGMENT_SHADER );
    gl.shaderSource( fragShdr, fragElem.textContent.replace(/^\s+|\s+$/g, '' ) );
    gl.compileShader( fragShdr );
*/
    program3 = gl.createProgram();
    gl.attachShader( program3, vertShdr );
    gl.attachShader( program3, fragShdr );
    gl.linkProgram( program3 );

  // Get locations of shader inputs so we can transfer data to GPU from CPU later
  // program 1 uses 1 attribute and 1 uniform
  var program1_positionLoc= gl.getAttribLocation(program1, 'position');
  program1_colorLoc= gl.getUniformLocation(program1, 'color');

 // program 2 uses 2 attributes and no uniforms
  var program2_positionLoc = gl.getAttribLocation(program2, 'position');
  var program2_colorLoc = gl.getAttribLocation(program2, 'color');

  program3_translationLoc= gl.getUniformLocation(program3, 'translation');

  // Define vertices drawn by program 1
var prog1VertexPositions = new Float32Array([
   -0.2,  0,
   -0.8,  0,
   -0.3, -0.2,
   -0.7, -0.2,
   -0.3,  0.2,
   -0.7,  0.2,
   -0.4,  0.4,
   -0.6,  0.4,
   -0.4, -0.4,
   -0.6, -0.4,
   -0.5,  0.6,
   -0.5, -0.6,
]);

// Define vertices and colors darwn by program 2
var prog2VertexPositions = new Float32Array([
   0.5,  0,
   0.5, -0.2,
   0.5,  0.2,
   0.5, -0.4,
   0.5,  0.4,
   0.4,  0,
   0.6,  0,
   0.3,  0,
   0.7,  0,
]);

const prog2VertexColors = new Float32Array([
   1, 0, 0,  // red
   0, 0, 1,  // blue
   0, 0, 1,
   0, 1, 0,  // green
   0, 1, 0,
   0, 1, 1,  // cyan
   0, 1, 1,
   1, 0, 1,  // magenta
   1, 0, 1,
]);
  // Send data to GPU buffers - note its the same STATE variable pointing to DIFFERENT buffers
  var position1Buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, position1Buffer);
  gl.bufferData(gl.ARRAY_BUFFER, prog1VertexPositions, gl.STATIC_DRAW);

  var position2Buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, position2Buffer);
  gl.bufferData(gl.ARRAY_BUFFER, prog2VertexPositions, gl.STATIC_DRAW);

  var color2Buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, color2Buffer);
  gl.bufferData(gl.ARRAY_BUFFER, prog2VertexColors, gl.STATIC_DRAW);

  // Render with program 1
  gl.useProgram( program1 );
  gl.bindBuffer(gl.ARRAY_BUFFER, position1Buffer);

  program1VAO = gl.createVertexArray();  
  gl.bindVertexArray(program1VAO);
  gl.enableVertexAttribArray(program1_positionLoc);
  gl.vertexAttribPointer(
    program1_positionLoc, // location
    2,                  // size (components per iteration)
    gl.FLOAT,           // type of to get from buffer
    false,              // normalize
    0,                  // stride (bytes to advance each iteration)
    0,                  // offset (bytes from start of buffer)
);


// orange
gl.uniform4fv(program1_colorLoc, [1, 0.7, 0.5, 1]);

// set the attributes to what's needed for program 2
gl.bindBuffer(gl.ARRAY_BUFFER, position2Buffer);
program2VAO = gl.createVertexArray();
gl.bindVertexArray(program2VAO);
gl.enableVertexAttribArray(program2_positionLoc);
gl.vertexAttribPointer(
    program2_positionLoc, // location
    2,                  // size (components per iteration)
    gl.FLOAT,           // type of to get from buffer
    false,              // normalize
    0,                  // stride (bytes to advance each iteration)
    0,                  // offset (bytes from start of buffer)
);

gl.bindBuffer(gl.ARRAY_BUFFER, color2Buffer);
gl.enableVertexAttribArray(program2_colorLoc);
gl.vertexAttribPointer(
    program2_colorLoc,    // location
    3,                  // size (components per iteration)
    gl.FLOAT,           // type of to get from buffer
    false,              // normalize
    0,                  // stride (bytes to advance each iteration)
    0,                  // offset (bytes from start of buffer)
);

render();
}
var t = 0.0;

function render()
{
  //gl.clear( gl.COLOR_BUFFER_BIT );
  t = t + 0.005;

  // Now just set state to link program objects with corresponding vertex oobjects and draw.
  gl.useProgram( program1 );
  gl.bindVertexArray(program1VAO);
  gl.uniform4fv(program1_colorLoc, [1, 0.7, 0.5, 1]);
  gl.drawArrays(gl.POINTS, 0, 6);

  gl.useProgram( program2 );
  gl.bindVertexArray(program2VAO);
  gl.drawArrays(gl.POINTS, 0, 9);

  gl.useProgram( program1 );
  gl.bindVertexArray(program1VAO);
  var green = (Math.cos(t) +1.0)/2.0;
  gl.uniform4fv(program1_colorLoc, [0, green, 0.5, 1]);
  gl.drawArrays(gl.POINTS, 6, 6);

  gl.useProgram( program3 );
  gl.bindVertexArray(program2VAO);
  gl.uniform4fv(program3_translationLoc, [0.5*Math.cos(t), 0.5*Math.sin(t), 0.0, 0.0]);
  gl.drawArrays(gl.POINTS, 0, 9);


  requestAnimationFrame(render)

};

</script>

</html>
